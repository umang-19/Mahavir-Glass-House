<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Mahavir Glass House</title>
    <meta name="description" content="View our portfolio of automobile glass replacements, repairs, and installations.">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .page-header {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), url('https://images.unsplash.com/photo-1517524008697-84bbe3c3fd98?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
            padding: 8rem 1.5rem 4rem;
            text-align: center;
            color: var(--bg-white);
        }
        .page-header h1 { color: var(--bg-white); font-size: 3rem; margin-bottom: 1rem; }

        /* Gallery Filter */
        .gallery-filter {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin: 3rem 0;
        }
        .filter-btn {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        .filter-btn:hover, .filter-btn.active {
            background: var(--primary-color);
            color: var(--bg-white);
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding-bottom: 5rem;
        }
        .gallery-item {
            position: relative;
            border-radius: 0.5rem;
            overflow: hidden;
            cursor: pointer;
            transform: scale(1);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .gallery-item.hide {
            display: none;
        }
        .gallery-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.1);
        }
        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
        }
        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }
        .gallery-overlay i {
            color: var(--bg-white);
            font-size: 2rem;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .gallery-item:hover .gallery-overlay i {
            transform: translateY(0);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .lightbox.active {
            opacity: 1;
            pointer-events: all;
        }
        .lightbox-content {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 0.5rem;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .lightbox-close:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header id="header">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fa-solid fa-car-side"></i> Mahavir<span>Glass House</span></a>
            <div class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></div>
            <nav>
                <ul class="nav-links" id="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="gallery.html" class="active">Gallery</a></li>
                    <li><a href="faq.html">FAQ</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container" data-aos="fade-up">
            <h1>Our Gallery</h1>
            <p>Our Work Speaks for Itself</p>
        </div>
    </section>

    <!-- Gallery Section -->
    <section class="container">
        
        <!-- Filters -->
        <div class="gallery-filter" data-aos="fade-up">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="windshield">Windshield</button>
            <button class="filter-btn" data-filter="door">Door Glass</button>
            <button class="filter-btn" data-filter="rear">Rear Glass</button>
            <button class="filter-btn" data-filter="workshop">Workshop</button>
        </div>

        <!-- Grid -->
        <div class="gallery-grid" id="gallery-grid" data-aos="fade-up">
            <div class="gallery-item" data-category="windshield">
                <img src="https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Windshield Replacement">
                <div class="gallery-overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
            </div>
            <div class="gallery-item" data-category="door">
                <img src="https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Door Glass">
                <div class="gallery-overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
            </div>
            <div class="gallery-item" data-category="workshop">
                <img src="https://images.unsplash.com/photo-1503375894013-7e3e7f414a51?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Workshop">
                <div class="gallery-overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
            </div>
            <div class="gallery-item" data-category="rear">
                <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Rear Windshield">
                <div class="gallery-overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
            </div>
            <div class="gallery-item" data-category="windshield">
                <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Windshield Installation">
                <div class="gallery-overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
            </div>
            <div class="gallery-item" data-category="workshop">
                <img src="https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Technician at work">
                <div class="gallery-overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
            </div>
        </div>

    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <i class="fa-solid fa-xmark lightbox-close" id="lightbox-close"></i>
        <img src="" alt="Gallery Image" class="lightbox-content" id="lightbox-img">
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom" style="border-top: none;">
                &copy; 2026 Mahavir Glass House. All Rights Reserved.
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const filterBtns = document.querySelectorAll('.filter-btn');
            const galleryItems = document.querySelectorAll('.gallery-item');
            
            // Filter functionality
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    // Remove active class from all
                    filterBtns.forEach(b => b.classList.remove('active'));
                    // Add active class to clicked
                    btn.classList.add('active');
                    
                    const filterValue = btn.getAttribute('data-filter');
                    
                    galleryItems.forEach(item => {
                        if(filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
                            item.classList.remove('hide');
                            setTimeout(() => { item.style.opacity = '1'; item.style.transform = 'scale(1)'; }, 50);
                        } else {
                            item.style.opacity = '0';
                            item.style.transform = 'scale(0.8)';
                            setTimeout(() => { item.classList.add('hide'); }, 300);
                        }
                    });
                });
            });

            // Lightbox functionality
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.getElementById('lightbox-close');

            galleryItems.forEach(item => {
                item.addEventListener('click', () => {
                    const imgSrc = item.querySelector('img').getAttribute('src');
                    lightboxImg.setAttribute('src', imgSrc);
                    lightbox.classList.add('active');
                    document.body.style.overflow = 'hidden'; // prevent scrolling
                });
            });

            closeBtn.addEventListener('click', () => {
                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
            });

            lightbox.addEventListener('click', (e) => {
                if(e.target === lightbox) {
                    lightbox.classList.remove('active');
                    document.body.style.overflow = 'auto';
                }
            });
        });
    </script>
</body>
</html>
